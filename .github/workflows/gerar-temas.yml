name: Gerar temas semanais

on:
  schedule:
    # Toda segunda-feira às 06:00 UTC (03:00 de Brasília)
    - cron: "0 6 * * 1"
  workflow_dispatch: # permite rodar manualmente pela UI do GitHub

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Gerar novos temas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run gerar-temas

      - name: Commitar temas atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain src/data/temas.json)" ]]; then
            git add src/data/temas.json
            git commit -m "chore(temas): atualização semanal automática"
            git push
          else
            echo "Nenhuma mudança em temas.json — nada a commitar."
          fi
